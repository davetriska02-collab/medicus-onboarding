name: Release practice pack

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# Builds a clean ZIP containing only what a practice needs and attaches it
# to a GitHub Release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build practice pack
        run: |
          mkdir -p "pack/Medicus Onboarding/data"
          cp index.html README.md "pack/Medicus Onboarding/"
          cp -r css js "pack/Medicus Onboarding/"
          cp data/data.js "pack/Medicus Onboarding/data/"
          cd pack && zip -rq "../medicus-onboarding-${GITHUB_REF_NAME}.zip" .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "medicus-onboarding-${GITHUB_REF_NAME}.zip" \
            --title "Medicus Onboarding $GITHUB_REF_NAME" \
            --notes-file .github/release-notes.md
