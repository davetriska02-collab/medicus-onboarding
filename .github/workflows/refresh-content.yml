name: Refresh Medicus Content

# Runs every Monday at 6am UTC, or manually from the Actions tab
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests beautifulsoup4

      - name: Scrape Zendesk for updated articles
        run: python scripts/scrape_zendesk.py

      - name: Rebuild data bundle (re-tag + re-quiz only if articles changed)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/build_data.py

      - name: Commit and push if content changed
        run: |
          git config --global user.name "Medicus Content Bot"
          git config --global user.email "actions@github.com"
          git add data/articles.json data/quizzes.json data/data.js
          git diff --staged --quiet && echo "No content changes." || (
            git commit -m "chore: refresh Medicus KB content [$(date -u +%Y-%m-%d)]" &&
            git push
          )
